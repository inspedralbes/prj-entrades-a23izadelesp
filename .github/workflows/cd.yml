name: CD - Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend (Laravel)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bentotickets-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/bentotickets-backend:latest

      - name: Build and push Realtime (Socket.IO)
        uses: docker/build-push-action@v5
        with:
          context: ./realtime
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bentotickets-realtime:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/bentotickets-realtime:latest

      - name: Build and push Frontend (Nuxt)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bentotickets-frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/bentotickets-frontend:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/bentotickets
            git pull origin main
            docker-compose pull
            docker-compose up -d --build
            docker-compose exec -T backend php artisan migrate --force
            docker-compose exec -T backend php artisan queue:restart
